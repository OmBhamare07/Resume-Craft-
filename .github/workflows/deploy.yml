name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node setup ─────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Write frontend .env from GitHub secrets ────
      - name: Create .env
        run: |
          cat > .env << EOF
          VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}
          EOF

      # ── 4. Install & build ────────────────────────────
      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      # ── 5. Write SSH key to file ──────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ── 6. Copy built dist/ to EC2 ────────────────────
      - name: Upload dist to EC2
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/Resume-Craft-master/dist/

      # ── 7. Copy updated backend + source to EC2 ───────
      - name: Upload source to EC2
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/Resume-Craft-master/

      # ── 8. Install backend deps + restart service ─────
      - name: Restart app on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'REMOTE'
            set -e
            cd ~/Resume-Craft-master/backend
            npm install --production
            sudo systemctl restart resumecraft
            sleep 2
            sudo systemctl is-active resumecraft && echo "✅ App is running!" || echo "❌ App failed to start"
          REMOTE
